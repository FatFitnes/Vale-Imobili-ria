<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Navbar</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="./SRC/imagens/LogoNavBar.png" alt="Logo" width="30" height="30" class="d-inline-block align-text-top">
                    BrandName
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Features</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Pricing</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">Disabled</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <h1 class="text-center py-3">Welcome to Our Website</h1>
        <div class="container py-4">
            <form class="row g-3">
                <div class="col-md-3">
                    <label for="inputPurpose" class="form-label">Finalidade</label>
                    <select id="inputPurpose" class="form-select">
                        <option selected>Escolha...</option>
                        <option>Comprar</option>
                        <option>Alugar</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="inputType" class="form-label">Tipo</label>
                    <select id="inputType" class="form-select">
                        <option selected>Escolha...</option>
                        <option>Apartamento</option>
                        <option>Casa</option>
                        <option>Terreno</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="inputRooms" class="form-label">Quartos</label>
                    <input type="number" class="form-control" id="inputRooms" placeholder="Ex.: 3">
                </div>
                <div class="col-md-2">
                    <label for="inputMinValue" class="form-label">Valor Mínimo</label>
                    <input type="number" class="form-control" id="inputMinValue" placeholder="R$">
                </div>
                <div class="col-md-2">
                    <label for="inputMaxValue" class="form-label">Valor Máximo</label>
                    <input type="number" class="form-control" id="inputMaxValue" placeholder="R$">
                </div>
                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-primary">Buscar</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="text-center py-3">
        <p>&copy; 2024 Your Company. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
